
<!DOCTYPE html>
<html>
<head>
  <title>Kalyani Portfolio</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #eef2f3, #dfe9f3);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 70%;
      margin: 40px auto;
    }

    h1 {
      color: #2c3e50;
      font-size: 32px;
    }

    .tagline {
      color: #555;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .section-title {
      margin-top: 40px;
      color: #34495e;
      border-left: 5px solid #3498db;
      padding-left: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
      box-shadow: 0px 6px 15px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .card p {
      color: #666;
    }

    a {
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact {
      margin-top: 50px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Hi, I'm Kalyani 👩‍💻</h1>
    <p class="tagline">Aspiring Data Analyst | SQL | Excel | Power BI</p>

    <h2 class="section-title">📂 Projects</h2>

    <div class="card">
      <h3>🍔 Food Delivery Analysis</h3>
      <p>Analyzed customer behavior using SQL</p>
      <a href="https://github.com/datapencil29/SQL-Portfolio">View Project</a>
    </div>

    <div class="card">
      <h3>📊 Sales Analysis</h3>
      <p>Worked on revenue trends</p>
      <a href="#">View Project</a>
    </div>

    <div class="contact">
      <h2 class="section-title">📞 Contact</h2>
      <p>Email: your@email.com</p>
    </div>

  </div>

</body>
</html>
